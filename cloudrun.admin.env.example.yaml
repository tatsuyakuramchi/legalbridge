# Secrets such as SLACK_BOT_TOKEN / BACKLOG_API_KEY / DATABASE_URL
# are managed via Secret Manager, not here.

BACKLOG_SPACE: "your-space"
BACKLOG_PROJECT_KEY: "LEGAL"

GOOGLE_DRIVE_FOLDER_OPTIONS: '[{"key":"legal","label":"Legal"},{"key":"license","label":"License"},{"key":"outsourcing","label":"Outsourcing"},{"key":"sales","label":"Sales"}]'
GOOGLE_DRIVE_FOLDER_DEFAULT_KEY: "legal"
GOOGLE_DRIVE_FOLDER_DEFAULT_LABEL: "Legal"
GOOGLE_SERVICE_ACCOUNT_KEY_PATH: "/secrets/gws-service-account.json"

ENABLE_SLACK_STARTUP: "0"
SKIP_SLACK_STARTUP: "1"
ENABLE_BACKGROUND_SYNC: "0"
ENABLE_BACKLOG_STARTUP_CHECK: "1"

BACKLOG_POLLING_INTERVAL_SEC: "30"
