# Secrets such as SLACK_BOT_TOKEN / SLACK_SIGNING_SECRET / BACKLOG_API_KEY
# are managed via Secret Manager, not here.
BACKLOG_SPACE: "your-space"
BACKLOG_PROJECT_KEY: "LEGAL"

# Recommended: Drive folder choices shown in Slack modal
GOOGLE_DRIVE_FOLDER_OPTIONS: '[{"key":"legal","label":"法務共有"},{"key":"license","label":"ライセンス共有"},{"key":"outsourcing","label":"業務委託共有"},{"key":"sales","label":"売買契約書共有"}]'
GOOGLE_DRIVE_FOLDER_DEFAULT_KEY: "legal"
GOOGLE_DRIVE_FOLDER_DEFAULT_LABEL: "法務共有"

# Recommended: Backlog issue type names used by /法務依頼 and /法務検索
BACKLOG_ISSUE_TYPE_NDA: "NDA"
BACKLOG_ISSUE_TYPE_OUTSOURCING: "業務委託基本契約"
BACKLOG_ISSUE_TYPE_LICENSE: "ライセンス契約"
BACKLOG_ISSUE_TYPE_LICENSE_SCHEDULE: "個別利用許諾条件"
BACKLOG_ISSUE_TYPE_SALES_BUYER: "売買契約（当社買手）"
