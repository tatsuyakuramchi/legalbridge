# Optional: Slack legal team notification
# If omitted, Cloud Run still accepts the request and only skips the post to Slack.
SLACK_LEGAL_CHANNEL: "C0000000000"
APPROVER_SLACK_ID: "U0000000000"
STAMP_OPERATOR_SLACK_ID: "U0000000000"

# Work execution mode
# inline: execute inside command-service
# http: send work items to work-service
# gcp-tasks: enqueue work items to Cloud Tasks
# log-only: accept but do not execute
WORK_QUEUE_MODE: "inline"

# Required when WORK_QUEUE_MODE=http or gcp-tasks
WORK_SERVICE_URL: "https://legalbridge-work-service-xxxxx-an.a.run.app"

# Required when WORK_QUEUE_MODE=gcp-tasks
GCP_PROJECT_ID: "your-gcp-project-id"
GCP_TASKS_LOCATION: "asia-northeast1"
GCP_TASKS_QUEUE: "legalbridge-work-items"

# Optional: Local DB sync
# DATABASE_URL is also managed via Secret Manager when needed.
