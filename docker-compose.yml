services:
  db:
    image: postgres:15
    container_name: legalbridge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: legalbridge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d legalbridge"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
