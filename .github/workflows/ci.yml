name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  gateway-config:
    runs-on: ubuntu-latest
    needs: build
    if: >
      ${{
        secrets.SLACK_BOT_TOKEN != '' &&
        secrets.SLACK_SIGNING_SECRET != '' &&
        secrets.BACKLOG_API_KEY != '' &&
        secrets.BACKLOG_SPACE != '' &&
        secrets.BACKLOG_PROJECT_KEY != ''
      }}
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
      BACKLOG_API_KEY: ${{ secrets.BACKLOG_API_KEY }}
      BACKLOG_SPACE: ${{ secrets.BACKLOG_SPACE }}
      BACKLOG_PROJECT_KEY: ${{ secrets.BACKLOG_PROJECT_KEY }}
      GATEWAY_STATUS_OUTPUT_PATH: artifacts/gateway-status.json
      BACKLOG_ISSUE_TYPE_NDA: ${{ vars.BACKLOG_ISSUE_TYPE_NDA }}
      BACKLOG_ISSUE_TYPE_OUTSOURCING: ${{ vars.BACKLOG_ISSUE_TYPE_OUTSOURCING }}
      BACKLOG_ISSUE_TYPE_LICENSE: ${{ vars.BACKLOG_ISSUE_TYPE_LICENSE }}
      BACKLOG_ISSUE_TYPE_LICENSE_SCHEDULE: ${{ vars.BACKLOG_ISSUE_TYPE_LICENSE_SCHEDULE }}
      BACKLOG_ISSUE_TYPE_SALES_BUYER: ${{ vars.BACKLOG_ISSUE_TYPE_SALES_BUYER }}
      BACKLOG_ISSUE_TYPE_SALES_SELLER_STANDARD: ${{ vars.BACKLOG_ISSUE_TYPE_SALES_SELLER_STANDARD }}
      BACKLOG_ISSUE_TYPE_SALES_SELLER_CREDIT: ${{ vars.BACKLOG_ISSUE_TYPE_SALES_SELLER_CREDIT }}
      BACKLOG_ISSUE_TYPE_PURCHASE_ORDER: ${{ vars.BACKLOG_ISSUE_TYPE_PURCHASE_ORDER }}
      BACKLOG_ISSUE_TYPE_PLANNING_ORDER: ${{ vars.BACKLOG_ISSUE_TYPE_PLANNING_ORDER }}
      BACKLOG_ISSUE_TYPE_DELIVERY: ${{ vars.BACKLOG_ISSUE_TYPE_DELIVERY }}
      BACKLOG_ISSUE_TYPE_MFG: ${{ vars.BACKLOG_ISSUE_TYPE_MFG }}
      BACKLOG_FIELD_REQUESTER: ${{ vars.BACKLOG_FIELD_REQUESTER }}
      BACKLOG_FIELD_CONTRACT_TYPE: ${{ vars.BACKLOG_FIELD_CONTRACT_TYPE }}
      BACKLOG_FIELD_INVOICE_REGISTRATION_NUMBER: ${{ vars.BACKLOG_FIELD_INVOICE_REGISTRATION_NUMBER }}
      BACKLOG_FIELD_COUNTERPARTY: ${{ vars.BACKLOG_FIELD_COUNTERPARTY }}
      BACKLOG_FIELD_DEADLINE: ${{ vars.BACKLOG_FIELD_DEADLINE }}
      BACKLOG_FIELD_CONTRACT_NO: ${{ vars.BACKLOG_FIELD_CONTRACT_NO }}
      BACKLOG_FIELD_COUNTERPARTY_ADDRESS: ${{ vars.BACKLOG_FIELD_COUNTERPARTY_ADDRESS }}
      BACKLOG_FIELD_COUNTERPARTY_REP: ${{ vars.BACKLOG_FIELD_COUNTERPARTY_REP }}
      BACKLOG_FIELD_REMARKS: ${{ vars.BACKLOG_FIELD_REMARKS }}
      BACKLOG_FIELD_CONTRACT_DATE: ${{ vars.BACKLOG_FIELD_CONTRACT_DATE }}
      BACKLOG_FIELD_CONTRACT_PERIOD: ${{ vars.BACKLOG_FIELD_CONTRACT_PERIOD }}
      BACKLOG_FIELD_CONFIDENTIALITY_PERIOD: ${{ vars.BACKLOG_FIELD_CONFIDENTIALITY_PERIOD }}
      BACKLOG_FIELD_NDA_PURPOSE: ${{ vars.BACKLOG_FIELD_NDA_PURPOSE }}
      BACKLOG_FIELD_JURISDICTION: ${{ vars.BACKLOG_FIELD_JURISDICTION }}
      BACKLOG_FIELD_ORIGINAL_WORK: ${{ vars.BACKLOG_FIELD_ORIGINAL_WORK }}
      BACKLOG_FIELD_ORIGINAL_AUTHOR: ${{ vars.BACKLOG_FIELD_ORIGINAL_AUTHOR }}
      BACKLOG_FIELD_CREDIT_NAME: ${{ vars.BACKLOG_FIELD_CREDIT_NAME }}
      BACKLOG_FIELD_LICENSE_KEY: ${{ vars.BACKLOG_FIELD_LICENSE_KEY }}
      BACKLOG_FIELD_LICENSE_TYPE_NAME: ${{ vars.BACKLOG_FIELD_LICENSE_TYPE_NAME }}
      BACKLOG_FIELD_LICENSE_START: ${{ vars.BACKLOG_FIELD_LICENSE_START }}
      BACKLOG_FIELD_DEAL_STRUCTURE: ${{ vars.BACKLOG_FIELD_DEAL_STRUCTURE }}
      BACKLOG_FIELD_LICENSE_SCOPE: ${{ vars.BACKLOG_FIELD_LICENSE_SCOPE }}
      BACKLOG_FIELD_IP_PRODUCT_SCOPE: ${{ vars.BACKLOG_FIELD_IP_PRODUCT_SCOPE }}
      BACKLOG_FIELD_TERRITORY: ${{ vars.BACKLOG_FIELD_TERRITORY }}
      BACKLOG_FIELD_BASE_AGREEMENT_KEY: ${{ vars.BACKLOG_FIELD_BASE_AGREEMENT_KEY }}
      BACKLOG_FIELD_EFFECTIVE_DATE: ${{ vars.BACKLOG_FIELD_EFFECTIVE_DATE }}
      BACKLOG_FIELD_CHANGE_MODE: ${{ vars.BACKLOG_FIELD_CHANGE_MODE }}
      BACKLOG_FIELD_PRODUCT_SCOPE: ${{ vars.BACKLOG_FIELD_PRODUCT_SCOPE }}
      BACKLOG_FIELD_DELIVERY_LOCATION: ${{ vars.BACKLOG_FIELD_DELIVERY_LOCATION }}
      BACKLOG_FIELD_INSPECTION_PERIOD_DAYS: ${{ vars.BACKLOG_FIELD_INSPECTION_PERIOD_DAYS }}
      BACKLOG_FIELD_PAYMENT_CONDITION_SUMMARY: ${{ vars.BACKLOG_FIELD_PAYMENT_CONDITION_SUMMARY }}
      BACKLOG_FIELD_MONTHLY_CLOSING_DAY: ${{ vars.BACKLOG_FIELD_MONTHLY_CLOSING_DAY }}
      BACKLOG_FIELD_PAYMENT_DUE_DAY: ${{ vars.BACKLOG_FIELD_PAYMENT_DUE_DAY }}
      BACKLOG_FIELD_PAYMENT_METHOD: ${{ vars.BACKLOG_FIELD_PAYMENT_METHOD }}
      BACKLOG_FIELD_SECURITY_DEPOSIT_AMOUNT: ${{ vars.BACKLOG_FIELD_SECURITY_DEPOSIT_AMOUNT }}
      BACKLOG_FIELD_DEPOSIT_REPLENISH_DAYS: ${{ vars.BACKLOG_FIELD_DEPOSIT_REPLENISH_DAYS }}
      BACKLOG_FIELD_PROJECT_TITLE: ${{ vars.BACKLOG_FIELD_PROJECT_TITLE }}
      BACKLOG_FIELD_MASTER_CONTRACT_REF: ${{ vars.BACKLOG_FIELD_MASTER_CONTRACT_REF }}
      BACKLOG_FIELD_PARENT_ISSUE_KEY: ${{ vars.BACKLOG_FIELD_PARENT_ISSUE_KEY }}
      BACKLOG_FIELD_ITEM_NO: ${{ vars.BACKLOG_FIELD_ITEM_NO }}
      BACKLOG_FIELD_DELIVERED_AMOUNT: ${{ vars.BACKLOG_FIELD_DELIVERED_AMOUNT }}
      BACKLOG_FIELD_DELIVERY_NOTE: ${{ vars.BACKLOG_FIELD_DELIVERY_NOTE }}
      BACKLOG_FIELD_PRODUCT_NAME: ${{ vars.BACKLOG_FIELD_PRODUCT_NAME }}
      BACKLOG_FIELD_COMPLETION_DATE: ${{ vars.BACKLOG_FIELD_COMPLETION_DATE }}
      BACKLOG_FIELD_QUANTITY: ${{ vars.BACKLOG_FIELD_QUANTITY }}
      BACKLOG_FIELD_MSRP: ${{ vars.BACKLOG_FIELD_MSRP }}
      BACKLOG_FIELD_REPORT_PERIOD_START: ${{ vars.BACKLOG_FIELD_REPORT_PERIOD_START }}
      BACKLOG_FIELD_REPORT_PERIOD_END: ${{ vars.BACKLOG_FIELD_REPORT_PERIOD_END }}
      BACKLOG_FIELD_NET_SALES: ${{ vars.BACKLOG_FIELD_NET_SALES }}
      BACKLOG_FIELD_S1_REPORT_DUE: ${{ vars.BACKLOG_FIELD_S1_REPORT_DUE }}
      BACKLOG_FIELD_S1_PAYMENT_DUE: ${{ vars.BACKLOG_FIELD_S1_PAYMENT_DUE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run gateway configuration check
        run: npm run gateway:check

      - name: Upload gateway status artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-status
          path: artifacts/gateway-status.json
          if-no-files-found: ignore
